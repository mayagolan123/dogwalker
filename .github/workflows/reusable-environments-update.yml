name: Reusable environments update

# Updates the environments git submodule repo (mayagolan123/environments).
# Uses a separate checkout + PAT push rather than mutating the submodule pointer
# in the app repo during CI.

on:
  workflow_call:
    inputs:
      update_mode:
        description: feature, staging, or production
        required: true
        type: string
      branch_name:
        description: Git branch ref for targetRevision (feature/staging)
        required: false
        type: string
        default: ""
      env_dir:
        description: Directory under environments/dogwalker/ (sanitized branch)
        required: false
        type: string
        default: ""
      image_tag:
        description: Image tag to write into values.yaml
        required: true
        type: string
      image_repository:
        description: Image repository (without registry username prefix)
        required: false
        type: string
        default: dogwalker
      github_environment:
        description: GitHub environment for approval gates (feature-*, staging, production)
        required: true
        type: string
    secrets:
      ENVIRONMENTS_REPO_TOKEN:
        required: true

permissions:
  contents: read

env:
  ENVIRONMENTS_REPO: mayagolan123/environments

jobs:
  update-environments:
    name: Update environments repo
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: ${{ inputs.github_environment }}

    steps:
      - name: Checkout environments repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.ENVIRONMENTS_REPO }}
          token: ${{ secrets.ENVIRONMENTS_REPO_TOKEN }}
          path: environments-repo

      - name: Create feature environment values
        if: inputs.update_mode == 'feature'
        env:
          BRANCH_NAME: ${{ inputs.branch_name }}
          ENV_DIR: ${{ inputs.env_dir }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          IMAGE_REPO: ${{ inputs.image_repository }}
        run: |
          python3 - <<'PY'
          import os
          import pathlib

          branch = os.environ["BRANCH_NAME"]
          env_dir = os.environ["ENV_DIR"]
          image_tag = os.environ["IMAGE_TAG"]
          image_repo = os.environ["IMAGE_REPO"]
          values_dir = pathlib.Path("environments-repo") / "dogwalker" / env_dir
          values_dir.mkdir(parents=True, exist_ok=True)
          content = (
              f"# Environment: {branch}\n"
              f"# Deploys the application chart from branch {branch}.\n"
              f"# Generated by GitHub Actions (PR pipeline).\n"
              f"\n"
              f"targetRevision: {branch}\n"
              f"environment: {branch}\n"
              f"\n"
              f"replicaCount: 1\n"
              f"\n"
              f"image:\n"
              f"  repository: {image_repo}\n"
              f'  tag: "{image_tag}"\n'
              f"  pullPolicy: IfNotPresent\n"
              f"\n"
              f"ingress:\n"
              f"  enabled: false\n"
              f"\n"
              f"env:\n"
              f"  DOG_API_BASE_URL: https://dog.ceo/api\n"
              f'  DOG_API_TIMEOUT_SECONDS: "10"\n'
              f"\n"
              f"podDisruptionBudget:\n"
              f"  enabled: false\n"
              f"\n"
              f"podAntiAffinity:\n"
              f"  enabled: false\n"
          )
          (values_dir / "values.yaml").write_text(content, encoding="utf-8")
          PY

      - name: Update staging values
        if: inputs.update_mode == 'staging'
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          BRANCH_NAME: ${{ inputs.branch_name }}
        run: |
          VALUES_FILE="environments-repo/dogwalker/staging/values.yaml"
          python3 - <<'PY'
          import os
          import pathlib
          import re

          path = pathlib.Path("environments-repo/dogwalker/staging/values.yaml")
          text = path.read_text(encoding="utf-8")
          revision = os.environ["BRANCH_NAME"]
          tag = os.environ["IMAGE_TAG"]
          text = re.sub(r"^targetRevision:.*$", f"targetRevision: {revision}", text, count=1, flags=re.M)
          text = re.sub(r"(?m)^  tag:.*$", f'  tag: "{tag}"', text, count=1)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Update production values
        if: inputs.update_mode == 'production'
        env:
          RELEASE_TAG: ${{ inputs.image_tag }}
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import re

          tag = os.environ["RELEASE_TAG"]
          path = pathlib.Path("environments-repo/dogwalker/production/values.yaml")
          text = path.read_text(encoding="utf-8")
          text = re.sub(r"^targetRevision:.*$", f"targetRevision: {tag}", text, count=1, flags=re.M)
          text = re.sub(r"(?m)^  tag:.*$", f'  tag: {tag}', text, count=1)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit and push
        working-directory: environments-repo
        env:
          UPDATE_MODE: ${{ inputs.update_mode }}
          ENV_DIR: ${{ inputs.env_dir }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "${UPDATE_MODE}" = "feature" ]; then
            git add "dogwalker/${ENV_DIR}/values.yaml"
            MSG="ci(dogwalker): add/update feature env ${ENV_DIR} (image ${IMAGE_TAG})"
          elif [ "${UPDATE_MODE}" = "staging" ]; then
            git add dogwalker/staging/values.yaml
            MSG="ci(dogwalker): promote staging to ${IMAGE_TAG}"
          else
            git add dogwalker/production/values.yaml
            MSG="ci(dogwalker): release production ${IMAGE_TAG}"
          fi

          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "${MSG}"
          git push origin HEAD
