name: Reusable tests

on:
  workflow_call:
    inputs:
      test_scope:
        description: unit, integration, or all
        required: false
        type: string
        default: all

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  PYTHONPATH: .

jobs:
  tests:
    name: Tests (${{ inputs.test_scope }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        if: inputs.test_scope == 'unit' || inputs.test_scope == 'all'
        run: pytest -m unit --junitxml=junit-unit.xml -v

      - name: Run integration tests
        if: inputs.test_scope == 'integration' || inputs.test_scope == 'all'
        run: pytest -m integration --junitxml=junit-integration.xml -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@5d5d22a31266ced268874388b861e4b58bb5c2f3 # v4.3.1
        with:
          name: junit-${{ inputs.test_scope }}-${{ github.run_id }}
          path: junit-*.xml
          retention-days: 7
          if-no-files-found: ignore
