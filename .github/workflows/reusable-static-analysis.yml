name: Reusable static analysis

on:
  workflow_call:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  PYTHONPATH: .

jobs:
  static-analysis:
    name: Static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-ci.txt

      - name: Install CI tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: pip-audit
        run: pip-audit -r requirements.txt

      - name: YAML lint
        run: |
          yamllint --strict \
            .github/workflows \
            deployment/dogwalker/Chart.yaml \
            deployment/dogwalker/values.yaml \
            compose.yaml

      - name: Install Hadolint
        env:
          HADOLINT_VERSION: "2.12.0"
        run: |
          curl -fsSL -o /tmp/hadolint-Linux-x86_64.sha256 \
            "https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}/hadolint-Linux-x86_64.sha256"
          curl -fsSL -o /tmp/hadolint-Linux-x86_64 \
            "https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}/hadolint-Linux-x86_64"
          (cd /tmp && sha256sum -c hadolint-Linux-x86_64.sha256)
          install -m 755 /tmp/hadolint-Linux-x86_64 /usr/local/bin/hadolint

      - name: Dockerfile lint
        run: hadolint Dockerfile

      - name: Install Helm
        uses: azure/setup-helm@511ed2945a693f779eeaf41bd54a303f1f0022c7 # v4.2.0
        with:
          version: v3.16.4

      - name: Helm lint
        run: helm lint ./deployment/dogwalker

      - name: Helm template
        run: |
          helm template dogwalker ./deployment/dogwalker \
            --set image.repository=dogwalker \
            --set image.tag=ci \
            > /dev/null
