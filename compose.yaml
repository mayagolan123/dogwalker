services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DOG_API_BASE_URL: https://dog.ceo/api
      DOG_API_TIMEOUT_SECONDS: "10"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
